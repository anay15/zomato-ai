services:
  - type: web
    name: forkfinder
    runtime: python
    region: singapore          # change to oregon / frankfurt if you prefer
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: >
      streamlit run src/app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --server.enableCORS false
      --server.enableXsrfProtection true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: LLM_PROVIDER
        value: groq             # groq | gemini | openai
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      # ── Secrets: set these in the Render dashboard, NOT here ────────────────
      # GROQ_API_KEY
      # GEMINI_API_KEY
      # OPENAI_API_KEY
